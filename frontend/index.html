<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Weather Visualization</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="theme-day">
    <!-- Background Canvas for animations -->
    <canvas id="weatherCanvas"></canvas>
    
    <!-- Weather UI Overlay -->
    <div class="weather-container">
        <header>
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name...">
                <button id="searchBtn">Search</button>
            </div>
            <button id="themeToggle" title="Toggle Day/Night Simulation">🌓</button>
        </header>

        <main class="weather-info">
            <div class="location">
                <h1 id="cityName">Detecting...</h1>
            </div>
            <div class="temperature">
                <span id="tempValue">--</span>°C
            </div>
            <div class="condition">
                <h2 id="conditionText">--</h2>
                <div class="details">
                    <span>Wind: <span id="windSpeed">--</span> km/h</span>
                </div>
            </div>
            <div id="loading" class="hidden loading-text">Fetching weather data...</div>
            <div id="error" class="hidden error-text"></div>
        </main>
    </div>

    <!-- Animation Scripts -->
    <script src="animations/clear.js"></script>
    <script src="animations/clouds.js"></script>
    <script src="animations/rain.js"></script>
    <script src="animations/snow.js"></script>
    <script src="animations/thunder.js"></script>
    
    <!-- Main App Script -->
    <script src="app.js"></script>
</body>
</html>
